<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - X'wafffle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">
                    <span class="logo-icon">🧇</span>
                    <span class="logo-text">X'wafffle</span>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
                <div class="cart-icon-wrapper">
                    <a href="cart.html" class="cart-icon">
                        <span class="cart-symbol">🛒</span>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <h1 class="page-title">Checkout</h1>

            <div class="checkout-content">
                <!-- Order Summary -->
                <div class="order-summary">
                    <h2>Order Summary</h2>
                    <div id="orderItemsList" class="order-items-list">
                        <!-- Dynamically populated -->
                    </div>

                    <div class="summary-totals">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="checkoutSubtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (10%):</span>
                            <span id="checkoutTax">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Discount:</span>
                            <span id="checkoutDiscount">-$0.00</span>
                        </div>
                        <div class="summary-row total">
                            <strong>Total:</strong>
                            <strong id="checkoutTotal">$0.00</strong>
                        </div>
                    </div>
                </div>

                <!-- Customer Information Form -->
                <div class="checkout-form">
                    <h2>Delivery Information</h2>
                    <form id="checkoutForm" onsubmit="handleCheckout(event)">
                        <div class="form-group">
                            <label for="customerName">Full Name *</label>
                            <input 
                                type="text" 
                                id="customerName" 
                                name="name" 
                                required 
                                placeholder="John Doe"
                            >
                        </div>

                        <div class="form-group">
                            <label for="customerPhone">Phone Number *</label>
                            <input 
                                type="tel" 
                                id="customerPhone" 
                                name="phone" 
                                required 
                                placeholder="+1234567890"
                            >
                            <small>Include country code (e.g., +1 for USA)</small>
                        </div>

                        <div class="form-group">
                            <label for="customerAddress">Delivery Address (Optional)</label>
                            <textarea 
                                id="customerAddress" 
                                name="address" 
                                placeholder="123 Main St, Apt 4B, New York, NY 10001"
                                rows="3"
                            ></textarea>
                        </div>

                        <div class="form-group">
                            <label for="specialNotes">Special Requests (Optional)</label>
                            <textarea 
                                id="specialNotes" 
                                name="notes" 
                                placeholder="No onions, extra sauce, etc."
                                rows="2"
                            ></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary btn-full">
                                Confirm Order & Pay on WhatsApp
                            </button>
                            <a href="cart.html" class="btn btn-secondary btn-full">Back to Cart</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 X'wafffle Cafe. All rights reserved. Order with us on WhatsApp!</p>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/cart.js"></script>
    <script src="js/whatsapp.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCheckoutSummary();
            updateCartCount();
        });

        function renderCheckoutSummary() {
            const cart = getCart();
            const itemsList = document.getElementById('orderItemsList');

            if (cart.length === 0) {
                window.location.href = 'menu.html';
                return;
            }

            itemsList.innerHTML = cart.map(item => `
                <div class="order-item">
                    <span>${item.name}</span>
                    <span class="qty">x${item.quantity}</span>
                    <span class="item-price">$${(item.price * item.quantity).toFixed(2)}</span>
                </div>
            `).join('');

            updateCheckoutTotals();
        }

        function updateCheckoutTotals() {
            const cart = getCart();
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.10;
            
            // Get discount from sessionStorage if it exists
            let discount = 0;
            const savedDiscount = sessionStorage.getItem('foodhubDiscount');
            if (savedDiscount) {
                discount = subtotal * parseFloat(savedDiscount);
            }
            
            const total = subtotal + tax - discount;

            document.getElementById('checkoutSubtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('checkoutTax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('checkoutDiscount').textContent = `-$${discount.toFixed(2)}`;
            document.getElementById('checkoutTotal').textContent = `$${total.toFixed(2)}`;
        }

        function handleCheckout(event) {
            event.preventDefault();

            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const notes = document.getElementById('specialNotes').value.trim();

            // Validation
            if (!name) {
                showToast('❌ Please enter your name');
                return;
            }
            if (!phone) {
                showToast('❌ Please enter your phone number');
                return;
            }

            const cart = getCart();
            if (cart.length === 0) {
                showToast('❌ Your cart is empty');
                return;
            }

            // Generate WhatsApp message
            const message = generateWhatsAppMessage(cart, name, phone, address, notes);

            // Get WhatsApp link
            const whatsappLink = getWhatsAppLink(message);

            // Store order data in sessionStorage for potential future use
            sessionStorage.setItem('lastOrder', JSON.stringify({
                customer: { name, phone, address, notes },
                items: cart,
                timestamp: new Date().toISOString()
            }));

            // Clear cart and redirect to WhatsApp
            setTimeout(() => {
                localStorage.removeItem('foodhubCart');
                updateCartCount();
                window.open(whatsappLink, '_blank');
                showToast('✅ Opening WhatsApp...');
                
                // Redirect to thank you after a short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }, 300);
        }
    </script>
</body>
</html>
